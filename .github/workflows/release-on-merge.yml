name: Release on merge to main

# Runs whenever a PR is merged into main. Reads the version from package.json,
# skips pre-release suffixes and already-tagged versions, then:
#   1. Publishes to npm via OIDC trusted publisher (no npm token needed)
#   2. Creates and pushes a "v{version}" git tag
#   3. Creates a GitHub Release with changelog notes
#
# Authentication: npmjs.com trusted publisher OIDC flow.
#
# setup-node with registry-url writes .npmrc (_authToken=${NODE_AUTH_TOKEN})
# and injects NODE_AUTH_TOKEN=github.token into GITHUB_ENV. The exchange step
# uses actions/github-script to call core.getIDToken('npm:publish') — which
# correctly URL-encodes the audience (npm%3Apublish) unlike raw curl — then
# POSTs the OIDC token to the npmjs exchange endpoint and overwrites
# NODE_AUTH_TOKEN with the returned short-lived npm token. Last write to
# GITHUB_ENV wins, so npm publish sees the real token.
#
# All three steps happen in one job so we don't need a cross-workflow trigger
# (GITHUB_TOKEN cannot trigger other workflows).

on:
  push:
    branches: [main]

permissions:
  id-token: write   # needed for OIDC trusted publisher + --provenance
  contents: write   # push tag + create GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed to check existing tags

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip pre-release versions
        if: contains(steps.pkg.outputs.version, '-')
        run: |
          echo "Version ${{ steps.pkg.outputs.version }} contains a pre-release suffix — skipping release."
          exit 0

      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="v${{ steps.pkg.outputs.version }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          # registry-url writes .npmrc with _authToken=${NODE_AUTH_TOKEN}.
          # setup-node also injects NODE_AUTH_TOKEN=github.token into GITHUB_ENV.
          # The exchange step below overwrites it with a real npm token.

      - name: Install dependencies
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        run: npm ci

      - name: Build vendor assets
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        run: npm run build

      - name: Exchange GitHub OIDC token for npm publish token
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        uses: actions/github-script@v7
        with:
          script: |
            // core.getIDToken() correctly URL-encodes npm:publish → npm%3Apublish,
            // which is why raw curl with &audience=npm:publish returned 404.
            const oidcToken = await core.getIDToken('npm:publish')

            const resp = await fetch('https://registry.npmjs.org/-/npm/v1/login/oidc', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ oidcToken }),
            })

            if (!resp.ok) {
              const body = await resp.text()
              throw new Error(`npm OIDC exchange failed: HTTP ${resp.status}\n${body}`)
            }

            const { token } = await resp.json()
            core.setSecret(token)
            // Overwrite NODE_AUTH_TOKEN — last write to GITHUB_ENV wins,
            // so npm publish will use this real npm token, not github.token.
            core.exportVariable('NODE_AUTH_TOKEN', token)

      - name: Publish to npm
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        run: npm publish --access public --provenance

      - name: Create and push git tag
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag_check.outputs.tag }}"
          git push origin "${{ steps.tag_check.outputs.tag }}"
          echo "Created and pushed tag ${{ steps.tag_check.outputs.tag }}"

      - name: Extract changelog for this version
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        id: changelog
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          NOTES=$(awk "/^## v?${VERSION}/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md 2>/dev/null || echo "")
          if [ -z "$NOTES" ]; then NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."; fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        uses: actions/github-script@v7
        with:
          script: |
            const tag  = "${{ steps.tag_check.outputs.tag }}";
            const body = `${{ steps.changelog.outputs.notes }}`;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name: tag,
              name: tag,
              body,
              draft: false,
              prerelease: tag.includes('-'),
            });
