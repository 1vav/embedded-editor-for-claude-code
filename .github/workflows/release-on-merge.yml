name: Release on merge to main

# Runs whenever a PR is merged into main. Reads the version from package.json,
# skips pre-release suffixes and already-tagged versions, then:
#   1. Publishes to npm via OIDC trusted publisher (no npm token needed)
#   2. Creates and pushes a "v{version}" git tag
#   3. Creates a GitHub Release with changelog notes
#
# Authentication: npmjs.com trusted publisher OIDC flow.
#
# The trusted publisher on npmjs.com is configured with environment="release".
# The job must declare `environment: release` so GitHub includes
# `environment:release` in the JWT sub claim. Without it, the JWT sub is
# `ref:refs/heads/main` which does not match the trusted publisher config.
#
# Flow:
#   1. github-script requests OIDC JWT with audience "npm:registry.npmjs.org"
#      (this specific audience is what npmjs trusted publisher requires)
#   2. JWT is exchanged at POST /-/npm/v1/oidc/token/exchange/package/{name}
#      → registry validates JWT claims against trusted publisher config
#      → returns a short-lived npm token
#   3. Short-lived token is written to NODE_AUTH_TOKEN (last GITHUB_ENV write
#      wins over setup-node's github.token injection)
#   4. npm publish uses NODE_AUTH_TOKEN as a standard npm token
#
# All three steps happen in one job so we don't need a cross-workflow trigger
# (GITHUB_TOKEN cannot trigger other workflows).

on:
  push:
    branches: [main]

permissions:
  id-token: write   # needed for OIDC trusted publisher + --provenance
  contents: write   # push tag + create GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release   # required: makes JWT sub = "environment:release" to match trusted publisher
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history needed to check existing tags

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip pre-release versions
        if: contains(steps.pkg.outputs.version, '-')
        run: |
          echo "Version ${{ steps.pkg.outputs.version }} contains a pre-release suffix — skipping release."
          exit 0

      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="v${{ steps.pkg.outputs.version }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          # registry-url writes .npmrc with _authToken=${NODE_AUTH_TOKEN}.
          # setup-node injects NODE_AUTH_TOKEN=github.token into GITHUB_ENV.
          # The OIDC step below overwrites it with the JWT (last write wins).

      - name: Install dependencies
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        run: npm ci

      - name: Build vendor assets
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        run: npm run build

      - name: Exchange OIDC JWT for short-lived npm token
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        uses: actions/github-script@v9
        with:
          script: |
            // npm trusted publisher requires audience "npm:registry.npmjs.org" (not "npm:publish").
            // The JWT must then be exchanged at the registry's OIDC endpoint for a
            // short-lived npm token — the registry does not accept the raw JWT as
            // a bearer token directly.
            const oidcToken = await core.getIDToken('npm:registry.npmjs.org')
            core.setSecret(oidcToken)

            const resp = await fetch(
              'https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/embedded-editor-for-claude-code',
              {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${oidcToken}` },
              }
            )
            if (!resp.ok) {
              const body = await resp.text()
              throw new Error(`OIDC token exchange failed: HTTP ${resp.status} — ${body}`)
            }
            const { token } = await resp.json()
            core.setSecret(token)
            // Overwrite NODE_AUTH_TOKEN — last GITHUB_ENV write wins over setup-node's injection.
            core.exportVariable('NODE_AUTH_TOKEN', token)

      - name: Publish to npm
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        run: npm publish --access public --provenance

      - name: Create and push git tag
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag_check.outputs.tag }}"
          git push origin "${{ steps.tag_check.outputs.tag }}"
          echo "Created and pushed tag ${{ steps.tag_check.outputs.tag }}"

      - name: Extract changelog for this version
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        id: changelog
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          NOTES=$(awk "/^## v?${VERSION}/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md 2>/dev/null || echo "")
          if [ -z "$NOTES" ]; then NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."; fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        uses: actions/github-script@v9
        with:
          script: |
            const tag  = "${{ steps.tag_check.outputs.tag }}";
            const body = `${{ steps.changelog.outputs.notes }}`;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name: tag,
              name: tag,
              body,
              draft: false,
              prerelease: tag.includes('-'),
            });
