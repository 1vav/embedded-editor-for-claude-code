version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      excalidraw:
        patterns: ["@excalidraw/*"]
      tldraw:
        patterns: ["tldraw", "@tldraw/*"]
      codemirror:
        patterns: ["@codemirror/*", "codemirror"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
