name: Release on merge to main

# Runs whenever a PR is merged into main. Reads the version from package.json,
# skips pre-release suffixes and already-tagged versions, then:
#   1. Publishes to npm via OIDC trusted publisher (no npm token needed)
#   2. Creates and pushes a "v{version}" git tag
#   3. Creates a GitHub Release with changelog notes
#
# Authentication: npmjs.com trusted publisher OIDC flow.
#
# Node 22 ships with npm 10.9.x which added OIDC trusted-publisher auto-exchange.
# registry-url is intentionally OMITTED from setup-node: setting it injects
# NODE_AUTH_TOKEN=github.token which blocks OIDC (registry returns 404 for
# invalid tokens). Without registry-url, npm detects ACTIONS_ID_TOKEN_REQUEST_URL
# in the environment, fetches an OIDC token, exchanges it with the registry,
# and publishes — no explicit token management needed.
#
# All three steps happen in one job so we don't need a cross-workflow trigger
# (GITHUB_TOKEN cannot trigger other workflows).

on:
  push:
    branches: [main]

permissions:
  id-token: write   # needed for OIDC trusted publisher + --provenance
  contents: write   # push tag + create GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed to check existing tags

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip pre-release versions
        if: contains(steps.pkg.outputs.version, '-')
        run: |
          echo "Version ${{ steps.pkg.outputs.version }} contains a pre-release suffix — skipping release."
          exit 0

      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="v${{ steps.pkg.outputs.version }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # registry-url intentionally omitted — it injects NODE_AUTH_TOKEN=github.token
          # which causes registry 404. npm 10.9+ auto-exchanges OIDC when no token is set.

      - name: Show npm version (for debugging)
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        run: npm --version

      - name: Install dependencies
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        run: npm ci

      - name: Build vendor assets
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        run: npm run build

      - name: Publish to npm
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        run: npm publish --access public --provenance --loglevel verbose
        # npm 10.9+ detects ACTIONS_ID_TOKEN_REQUEST_URL, auto-exchanges the OIDC
        # token with the npmjs trusted publisher endpoint, and publishes.

      - name: Create and push git tag
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag_check.outputs.tag }}"
          git push origin "${{ steps.tag_check.outputs.tag }}"
          echo "Created and pushed tag ${{ steps.tag_check.outputs.tag }}"

      - name: Extract changelog for this version
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        id: changelog
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          NOTES=$(awk "/^## v?${VERSION}/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md 2>/dev/null || echo "")
          if [ -z "$NOTES" ]; then NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."; fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        uses: actions/github-script@v7
        with:
          script: |
            const tag  = "${{ steps.tag_check.outputs.tag }}";
            const body = `${{ steps.changelog.outputs.notes }}`;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name: tag,
              name: tag,
              body,
              draft: false,
              prerelease: tag.includes('-'),
            });
