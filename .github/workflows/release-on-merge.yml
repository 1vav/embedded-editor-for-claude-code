name: Release on merge to main

# Runs whenever a PR is merged into main. Reads the version from package.json,
# skips pre-release suffixes and already-tagged versions, then:
#   1. Publishes to npm via OIDC trusted publisher (no npm token needed)
#   2. Creates and pushes a "v{version}" git tag
#   3. Creates a GitHub Release with changelog notes
#
# Authentication: uses the npmjs.com trusted publisher OIDC flow.
# npm CLI does NOT auto-exchange OIDC tokens — the exchange must be done explicitly.
# The "Obtain npm token" step requests a GitHub OIDC token (audience=npm:publish),
# POSTs it to the npmjs OIDC endpoint, and writes the returned token to NODE_AUTH_TOKEN.
#
# All three steps happen in one job so we don't need a cross-workflow trigger
# (GITHUB_TOKEN cannot trigger other workflows).

on:
  push:
    branches: [main]

permissions:
  id-token: write   # needed for OIDC trusted publisher + --provenance
  contents: write   # push tag + create GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed to check existing tags

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip pre-release versions
        if: contains(steps.pkg.outputs.version, '-')
        run: |
          echo "Version ${{ steps.pkg.outputs.version }} contains a pre-release suffix — skipping release."
          exit 0

      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="v${{ steps.pkg.outputs.version }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        run: npm ci

      - name: Build vendor assets
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        run: npm run build

      - name: Obtain npm token via OIDC exchange
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        run: |
          OIDC_TOKEN=$(curl -fsSL \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:publish" \
            | jq -r '.value')
          NPM_TOKEN=$(curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -d "{\"oidcToken\": \"${OIDC_TOKEN}\"}" \
            "https://registry.npmjs.org/-/npm/v1/login/oidc" \
            | jq -r '.token')
          echo "::add-mask::${NPM_TOKEN}"
          echo "NODE_AUTH_TOKEN=${NPM_TOKEN}" >> "${GITHUB_ENV}"

      - name: Publish to npm
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        run: npm publish --access public --provenance

      - name: Create and push git tag
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag_check.outputs.tag }}"
          git push origin "${{ steps.tag_check.outputs.tag }}"
          echo "Created and pushed tag ${{ steps.tag_check.outputs.tag }}"

      - name: Extract changelog for this version
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        id: changelog
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          NOTES=$(awk "/^## v?${VERSION}/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md 2>/dev/null || echo "")
          if [ -z "$NOTES" ]; then NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."; fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false' && !contains(steps.pkg.outputs.version, '-')
        uses: actions/github-script@v7
        with:
          script: |
            const tag  = "${{ steps.tag_check.outputs.tag }}";
            const body = `${{ steps.changelog.outputs.notes }}`;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name: tag,
              name: tag,
              body,
              draft: false,
              prerelease: tag.includes('-'),
            });
