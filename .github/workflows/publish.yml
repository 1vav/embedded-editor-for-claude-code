name: Publish to npm

on:
  push:
    tags: ['v*']

permissions:
  id-token: write
  contents: write  # needed to create GitHub Release

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build vendor assets
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Pull the section between "## v$VERSION" and the next "## v" heading
          NOTES=$(awk "/^## v?${VERSION}/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md 2>/dev/null || echo "")
          if [ -z "$NOTES" ]; then NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."; fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag  = context.ref.replace('refs/tags/', '');
            const body = `${{ steps.changelog.outputs.notes }}`;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name: tag,
              name: tag,
              body,
              draft: false,
              prerelease: tag.includes('-'),
            });
